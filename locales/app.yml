  ko: "결과를 %{path} 에 기록했습니다"
  ja: "結果を %{path} に書き込みました"
  zh: "结果已写入 %{path}"

# ── git ───────────────────────────────────────────────────
git.repo_not_found:
  en: "Cannot find a git repository: %{path}"
  ko: "git 저장소를 찾을 수 없습니다: %{path}"
  ja: "gitリポジトリが見つかりません: %{path}"
  zh: "找不到 git 仓库: %{path}"
