  ko: "훅 실패 → fail 훅 실행"
  ja: "フック失敗 → fail フック実行"
  zh: "钩子失败 → 运行 fail 钩子"

# ── cache ─────────────────────────────────────────────────
cache.hit:
  en: "Cache hit: %{path}"
  ko: "캐시 적중: %{path}"
  ja: "キャッシュヒット: %{path}"
  zh: "缓存命中: %{path}"
cache.corrupt:
  en: "Cache file corrupted, deleting: %{path}"
  ko: "캐시 파일이 손상되어 삭제합니다: %{path}"
  ja: "キャッシュファイルが破損、削除します: %{path}"
  zh: "缓存文件损坏，删除: %{path}"
