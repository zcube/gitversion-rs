  zh: "[dry-run] 跳过执行: %{cmd}"
exec.running:
  en: "Running: %{cmd}"
  ko: "실행: %{cmd}"
  ja: "実行: %{cmd}"
  zh: "执行: %{cmd}"
exec.run_failed:
  en: "Failed to run command: %{cmd}"
  ko: "명령 실행 실패: %{cmd}"
  ja: "コマンド実行に失敗: %{cmd}"
  zh: "运行命令失败: %{cmd}"
exec.cmd_failed:
  en: "Command failed (code %{code}): %{cmd}"
  ko: "명령이 실패했습니다(코드 %{code}): %{cmd}"
  ja: "コマンドが失敗しました(コード %{code}): %{cmd}"
  zh: "命令失败(代码 %{code}): %{cmd}"
exec.hook_failed:
  en: "%{name} hook failed"
  ko: "%{name} 훅 실패"
  ja: "%{name} フック失敗"
  zh: "%{name} 钩子失败"
