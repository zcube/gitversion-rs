  ko: "캐시 삭제 실패: %{path}"
  ja: "キャッシュ削除に失敗: %{path}"
  zh: "清除缓存失败: %{path}"

# ── exec ──────────────────────────────────────────────────
exec.dry_run:
  en: "[dry-run] skipped: %{cmd}"
  ko: "[dry-run] 실행 생략: %{cmd}"
  ja: "[dry-run] 実行省略: %{cmd}"
  zh: "[dry-run] 跳过执行: %{cmd}"
exec.running:
  en: "Running: %{cmd}"
  ko: "실행: %{cmd}"
  ja: "実行: %{cmd}"
  zh: "执行: %{cmd}"
exec.run_failed:
  en: "Failed to run command: %{cmd}"
  ko: "명령 실행 실패: %{cmd}"
  ja: "コマンド実行に失敗: %{cmd}"
  zh: "运行命令失败: %{cmd}"
exec.cmd_failed:
  en: "Command failed (code %{code}): %{cmd}"
  ko: "명령이 실패했습니다(코드 %{code}): %{cmd}"
  ja: "コマンドが失敗しました(コード %{code}): %{cmd}"
  zh: "命令失败(代码 %{code}): %{cmd}"
exec.hook_failed:
  en: "%{name} hook failed"
  ko: "%{name} 훅 실패"
  ja: "%{name} フック失敗"
  zh: "%{name} 钩子失败"
exec.exec_prepare_failed:
  en: "--exec (prepare) failed"
  ko: "--exec(prepare) 실패"
  ja: "--exec(prepare) 失敗"
  zh: "--exec(prepare) 失败"
