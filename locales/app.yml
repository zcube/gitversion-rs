  zh: "删除已有克隆失败: %{path}"
remote.cloning:
  en: "Cloning remote: %{url} (branch %{branch}) -> %{dest}"
  ko: "원격 저장소 clone: %{url} (브랜치 %{branch}) -> %{dest}"
  ja: "リモートをclone: %{url} (ブランチ %{branch}) -> %{dest}"
  zh: "克隆远程: %{url} (分支 %{branch}) -> %{dest}"
remote.clone_prepare_failed:
