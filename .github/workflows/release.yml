name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # 릴리스 버전은 Cargo.toml(placeholder)이 아니라 gitversion 자신이 산출한다(dogfooding).
  # 태그된 커밋에서 gitversion 은 태그의 깨끗한 버전(예: v0.1.0 -> 0.1.0)을 계산한다.
  #
  # 버저닝은 gittools-actions(GitVersion 액션)로 수행하되, .NET GitVersion.Tool 대신
  # 우리가 부트스트랩 빌드한 네이티브 gitversion-rs 바이너리를 쓰게 한다
  # (GITVERSION_RS_EXE). 이로써 액션 연동 경로까지 자기 자신으로 검증한다.
  version:
    name: Compute version (gitversion-rs via gittools-actions)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gv.outputs.semVer }}
    env:
      GITVERSION_RS_EXE: ${{ github.workspace }}/target/release/gitversion-rs
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0 # gitversion 은 전체 히스토리와 태그가 필요하다.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build gitversion-rs (bootstrap)
        run: cargo build --release --bin gitversion-rs
      - name: Setup GitVersion (native gitversion-rs)
        uses: zcube/gittools-actions/gitversion/setup@feature/gitversion-rs-support
      - id: gv
        name: Compute version
        uses: zcube/gittools-actions/gitversion/execute@feature/gitversion-rs-support
      - name: Ensure GitHub Release exists
        # taiki-e/upload-rust-binary-action 은 기존 Release 에 자산을 올린다.
        # 병렬 build 잡들이 업로드할 수 있도록 여기서 먼저 Release 를 만들어 둔다.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          GV: ${{ steps.gv.outputs.semVer }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" --notes "gitversion $GV"
          fi

  build:
    name: ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Inject gitversion version into Cargo.toml
        shell: bash
        env:
          GV_VERSION: ${{ needs.version.outputs.version }}
        run: |
          # Cargo.toml 의 [package] version 은 placeholder 다. 빌드 전에 gitversion
          # 산출 버전으로 덮어써, 배포 바이너리의 `--version` 이 실제 릴리스 버전을 보고한다.
          # rust-version 라인과 구분하기 위해 줄 시작이 정확히 'version =' 인 첫 줄만 교체.
          python3 - "$GV_VERSION" <<'PY'
          import re, sys
          v = sys.argv[1]
          s = open("Cargo.toml", encoding="utf-8").read()
          s = re.sub(r'(?m)^version = "[^"]*"', f'version = "{v}"', s, count=1)
          open("Cargo.toml", "w", encoding="utf-8").write(s)
          print(f"Cargo.toml version set to {v}")
          PY
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: gitversion-rs
          target: ${{ matrix.target }}
          # taiki-e/upload-rust-binary-action cross-compiles via `cross` when needed.
          archive: gitversion-rs-$tag-$target
          include: README.md,README.ko.md,README.ja.md,README.zh.md,LICENSE
          # 태그 푸시는 ref 태그를, workflow_dispatch 는 입력 태그를 빌드한다.
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # 빌드/업로드가 끝나면 zcube/homebrew-tap 의 포뮬러를 자동 갱신한다.
  # 필요 시크릿: HOMEBREW_TAP_TOKEN (homebrew-tap 에 contents:write 권한이 있는 PAT).
  # 시크릿이 없으면 잡을 건너뛴다(릴리스 자체는 영향 없음). 사전 릴리스(0.1.0-rc.1 등)도 건너뜀.
  homebrew:
    name: Update Homebrew tap
    needs: [version, build]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.version.outputs.version, '-') }}
    steps:
      - name: Render and push formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
          SRC_REPO: ${{ github.repository }}
          TAP_REPO: zcube/homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN 시크릿이 없어 tap 갱신을 건너뜁니다."
            exit 0
          fi
          base="https://github.com/$SRC_REPO/releases/download/$TAG"
          mkdir -p /tmp/dl
          sha() {
            gh release download "$TAG" --repo "$SRC_REPO" --pattern "$1" --dir /tmp/dl --clobber
            sha256sum "/tmp/dl/$1" | awk '{print $1}'
          }
          export SHA_MAC_ARM="$(sha "gitversion-rs-$TAG-aarch64-apple-darwin.tar.gz")"
          export SHA_MAC_X86="$(sha "gitversion-rs-$TAG-x86_64-apple-darwin.tar.gz")"
          export SHA_LIN_ARM="$(sha "gitversion-rs-$TAG-aarch64-unknown-linux-gnu.tar.gz")"
          export SHA_LIN_X86="$(sha "gitversion-rs-$TAG-x86_64-unknown-linux-gnu.tar.gz")"
          export BASE="$base"

          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/$TAP_REPO.git" tap
          python3 - <<'PY'
          import os
          v   = os.environ["VERSION"]
          tag = os.environ["TAG"]
          base = os.environ["BASE"]
          # .NET GitVersion(명령명 gitversion)과 겹치지 않도록 명령/포뮬러를 gitversion-rs 로 통일.
          f = f'''class GitversionRs < Formula
            desc "Rust port of GitVersion - semantic versioning from Git history"
            homepage "https://github.com/zcube/gitversion-rs"
            version "{v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "{base}/gitversion-rs-{tag}-aarch64-apple-darwin.tar.gz"
                sha256 "{os.environ["SHA_MAC_ARM"]}"
              else
                url "{base}/gitversion-rs-{tag}-x86_64-apple-darwin.tar.gz"
                sha256 "{os.environ["SHA_MAC_X86"]}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "{base}/gitversion-rs-{tag}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "{os.environ["SHA_LIN_ARM"]}"
              else
                url "{base}/gitversion-rs-{tag}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "{os.environ["SHA_LIN_X86"]}"
              end
            end

            def install
              bin.install "gitversion-rs"
            end

            test do
              assert_match version.to_s, shell_output("#{{bin}}/gitversion-rs --version")
            end
          end
          '''
          open("tap/Formula/gitversion-rs.rb", "w", encoding="utf-8").write(f)
          # 예전 gitversion.rb(충돌 명령) 이 남아 있으면 제거.
          try:
              os.remove("tap/Formula/gitversion.rb")
          except FileNotFoundError:
              pass
          print(f"rendered gitversion-rs formula for {v}")
          PY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A Formula/
          if git diff --cached --quiet; then
            echo "포뮬러 변경 없음."
            exit 0
          fi
          git commit -m "chore: gitversion-rs $VERSION 업데이트"
          git push

  # 모든 바이너리 업로드 후 SHA256 체크섬을 만들고 cosign 으로 keyless 서명(Sigstore)한다.
  # GitHub Actions OIDC(id-token)를 사용하므로 별도 키/시크릿이 필요 없다.
  checksums:
    name: Checksums & cosign signature
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release 에 자산 업로드
      id-token: write # cosign keyless 서명(Sigstore OIDC)
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download release binaries
        run: |
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --dir dist --pattern 'gitversion-rs-*'
      - name: Generate SHA256 checksums
        working-directory: dist
        run: sha256sum gitversion-rs-* > checksums.txt
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign checksums (keyless)
        working-directory: dist
        run: |
          # 서명·인증서가 포함된 Sigstore bundle 생성.
          cosign sign-blob --yes checksums.txt --bundle checksums.txt.sigstore.json
      - name: Upload checksums and signature
        run: |
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            dist/checksums.txt dist/checksums.txt.sigstore.json
      - name: Add verification notes to the release
        run: |
          NOTES="$(cat <<EOF
          ## Install

          \`\`\`bash
          brew install zcube/tap/gitversion-rs
          \`\`\`

          Or download a prebuilt binary below. Archives are named \`gitversion-rs-${TAG}-<target>\`.

          ## Integrity verification

          \`\`\`bash
          # checksums
          sha256sum -c checksums.txt --ignore-missing

          # Sigstore signature (cosign)
          cosign verify-blob checksums.txt \\
            --bundle checksums.txt.sigstore.json \\
            --certificate-identity-regexp 'https://github.com/${GITHUB_REPOSITORY}/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          \`\`\`
          EOF
          )"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
