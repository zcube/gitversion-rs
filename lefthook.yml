pre-commit:
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings
    git-warden-diff:
      run: git-warden diff

commit-msg:
  commands:
    git-warden-msg:
      run: git-warden msg {1}

prepare-commit-msg:
  commands:
    git-warden-prepare:
      run: git-warden prepare-msg {1}

pre-push:
  commands:
    test:
      run: cargo test
