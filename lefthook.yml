# lefthook 설정 — 로컬에서 CI 게이트(fmt/clippy/test)를 미리 강제한다.
# 설치: lefthook install   (제거: lefthook uninstall)

pre-commit:
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings

pre-push:
  commands:
    test:
      run: cargo test
